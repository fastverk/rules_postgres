[package]
name = "pg_sha2"
version = "0.0.1"
edition = "2021"
description = "Hand-translation of Postgres' src/common/sha2.c → Rust. First milestone of the cluster-driven C→Rust translation spike (see project_c_to_rust_translation memory)."
publish = false

[lib]
crate-type = ["rlib", "staticlib", "cdylib"]
# staticlib + cdylib so we can link against the same .o the C version
# produces, for differential testing. `no_mangle extern "C"` exports
# keep symbol names identical to Postgres' C ABI.

[features]
default = []
# When set, swaps `wrapping_add` for `unchecked_add` (UB on overflow).
# Matches C signed-int semantics exactly at the IR level. Off by
# default — `wrapping_add` is sound and produces near-identical IR.
match-c-ub = []

[build-dependencies]
# Compiles Postgres' actual src/common/sha2.c (vendored in
# c_oracle/sha2.c) into a static lib that Rust tests link against
# as the C-side oracle for diff-testing. See build.rs.
cc = "1"

[dev-dependencies]
# Diff-test deps. The diff_sha256 test links pg_sha2's hand-translated
# Rust SHA-256 (candidate) against Postgres' actual C SHA-256 (the
# oracle, compiled from c_oracle/sha2.c via build.rs).
# Generated by `rules_difftest emit` from
# /Volumes/Workspace/rules_difftest/examples/sha2/sha256.spec.toml.
proptest = "1"
